<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopEase Login</title>

    <link rel="stylesheet" href="css/style.css">

    <style>
        body{
            margin:0;
            font-family:Arial, Helvetica, sans-serif;
            background:linear-gradient(135deg,#2563eb,#4f46e5);
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .login-box{
            width:380px;
            background:#fff;
            padding:40px;
            border-radius:15px;
            box-shadow:0 15px 30px rgba(0,0,0,.2);
            text-align:center;
        }

        .login-box h1{
            color:#2563eb;
            margin-bottom:10px;
        }

        .login-box p{
            color:#777;
            margin-bottom:25px;
        }

        .login-box input{
            width:100%;
            padding:14px;
            margin:10px 0;
            border:1px solid #ddd;
            border-radius:8px;
            box-sizing:border-box;
            font-size:16px;
        }

        .login-box button{
            width:100%;
            padding:14px;
            margin-top:15px;
            border:none;
            background:#2563eb;
            color:white;
            font-size:16px;
            border-radius:8px;
            cursor:pointer;
            transition:.3s;
        }

        .login-box button:hover{
            background:#1d4ed8;
        }

        #message{
            margin-top:15px;
            color:red;
            font-weight:bold;
        }

        .logo{
            font-size:45px;
            margin-bottom:10px;
        }
    </style>
</head>

<body>

<div class="login-box">

    <div class="logo">🛍️</div>

    <h1>ShopEase</h1>

    <p>Login to continue shopping</p>

    <input
        type="text"
        id="username"
        placeholder="Username">

    <input
        type="password"
        id="password"
        placeholder="Password">

    <button onclick="login()">
        Login
    </button>

    <p id="message"></p>

</div>

<script src="js/login.js"></script>

</body>
</html>
